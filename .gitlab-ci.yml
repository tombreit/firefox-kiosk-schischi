stages:
  - build
  - sign
  - publish
  - deploy

lint:
  stage: build
  image: node:lts-slim
  script:
    - npm install
    - web-ext lint

build:
  stage: build
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - web-ext build --artifacts-dir dist --filename firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-unsigned
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days

sign-xpi:
  stage: sign
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - VERSION=$(node -p "require('./manifest.json').version")
    - web-ext sign --channel=unlisted --api-key="$WEB_EXT_API_KEY" --api-secret="$WEB_EXT_API_SECRET" --artifacts-dir dist
    - mv "dist/firefox_kiosk_schischi-${VERSION}.xpi" dist/firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-signed
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days
  only:
    - main

publish-xpi:
  stage: publish
  image: alpine:latest
  needs:
    - job: sign-xpi
      artifacts: true
  script:
    - mkdir -p public
    - cp dist/firefox-kiosk-schischi.xpi public/firefox-kiosk-schischi.xpi
  artifacts:
    paths:
      - public/firefox-kiosk-schischi.xpi
  only:
    - main

pages:
  stage: deploy
  image: alpine:latest
  needs:
    - job: publish-xpi
      artifacts: true
  script:
    - cp index.html public/
  artifacts:
    paths:
      - public
  only:
    - main
