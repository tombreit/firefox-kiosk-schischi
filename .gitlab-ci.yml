stages:
  - build
  - sign
  - publish
  - deploy

lint:
  stage: build
  image: node:lts-slim
  script:
    - npm install
    - npx web-ext lint

build:
  stage: build
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - npx web-ext build --artifacts-dir dist --filename firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-unsigned
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days

sign-xpi:
  stage: sign
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - npx web-ext sign --channel=unlisted --api-key="$WEB_EXT_API_KEY" --api-secret="$WEB_EXT_API_SECRET" --artifacts-dir dist
    - mv dist/*.xpi dist/firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-signed
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days
  only:
    - main

publish-xpi:
  stage: publish
  image: node:lts-slim
  needs:
    - job: sign-xpi
      artifacts: true
  script:
    - mkdir -p public
    - VERSION=$(node -p "require('./manifest.json').version")
    - UPDATE_LINK="${CI_PAGES_URL}/firefox-kiosk-schischi.xpi"
    - node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); const addonId=manifest.browser_specific_settings.gecko.id; const version=process.env.VERSION; const updateLink=process.env.UPDATE_LINK; const updates={addons:{[addonId]:{updates:[{version, update_link:updateLink}]}}}; fs.writeFileSync('public/updates.json', JSON.stringify(updates, null, 2) + '\n');"
    - cp dist/firefox-kiosk-schischi.xpi public/firefox-kiosk-schischi.xpi
  artifacts:
    paths:
      - public/firefox-kiosk-schischi.xpi
      - public/updates.json
  only:
    - main

pages:
  stage: deploy
  image: alpine:latest
  needs:
    - job: publish-xpi
      artifacts: true
  script:
    - cp index.html public/
  artifacts:
    paths:
      - public
  only:
    - main
