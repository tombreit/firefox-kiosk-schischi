stages:
  - build
  - sign

lint:
  stage: build
  image: node:lts-slim
  script:
    - npm install
    - npx web-ext lint

build:
  stage: build
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - npx web-ext build --artifacts-dir dist --filename firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-unsigned
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days

sign-xpi:
  stage: sign
  image: node:lts-slim
  variables:
    GIT_DEPTH: "2"
  needs: [lint]
  script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends jq git
    - |
      PREV=$(git show HEAD~1:manifest.json 2>/dev/null | jq -r '.version' || echo "none")
      CURR=$(jq -r '.version' manifest.json)
      if [ "$PREV" = "$CURR" ]; then
        echo "Version unchanged ($CURR) — skipping AMO submission."
        exit 0
      fi
      echo "Version changed: $PREV → $CURR"
    - npm install
    - npx web-ext sign --channel=listed --amo-metadata=amo-metadata.json --api-key="$WEB_EXT_API_KEY" --api-secret="$WEB_EXT_API_SECRET" --artifacts-dir dist
    - mv dist/*.xpi dist/firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-signed
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days
    optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
