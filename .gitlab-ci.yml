stages:
  - build
  - sign
  - publish
  - deploy

lint:
  stage: build
  image: node:lts-slim
  script:
    - npm install
    - npm run lint

build:
  stage: build
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - npm run version
    - npm run build
  artifacts:
    name: firefox-kiosk-schischi-unsigned
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days

sign-xpi:
  stage: sign
  image: node:lts-slim
  needs: [lint]
  script:
    - npm install
    - npm run sign
    - mv dist/*.xpi dist/firefox-kiosk-schischi.xpi
  artifacts:
    name: firefox-kiosk-schischi-signed
    paths:
      - dist/firefox-kiosk-schischi.xpi
    expire_in: 30 days
  only:
    - main

publish-xpi:
  stage: publish
  image: alpine:latest
  needs:
    - job: sign-xpi
      artifacts: true
  script:
    - mkdir -p public
    - cp dist/firefox-kiosk-schischi.xpi public/firefox-kiosk-schischi.xpi
  artifacts:
    paths:
      - public/firefox-kiosk-schischi.xpi
  only:
    - main

pages:
  stage: deploy
  image: alpine:latest
  needs:
    - job: publish-xpi
      artifacts: true
  script:
    - cp index.html public/
  artifacts:
    paths:
      - public
  only:
    - main
